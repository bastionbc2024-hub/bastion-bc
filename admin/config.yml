backend:
  name: github
  repo: ВАШ_ЛОГІН/НАЗВА_РЕПОЗИТОРІЮ # Наприклад: ivan/my-website
  branch: main # або master

media_folder: "images" # папка для фото
public_folder: "/images"

collections:
  - name: "pages"
    label: "Сторінки"
    files:
      - label: "Головна сторінка"
        name: "index"
        file: "index.html"
        fields:
          - {label: "Заголовок", name: "title", widget: "string"}
          - {label: "Текст", name: "body", widget: "markdown"}