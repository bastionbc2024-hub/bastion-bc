<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bastion-BC | Admin</title>
  <!-- Скрипт авторизації -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- Скрипт самої адмінки -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // 1. Вказуємо нову адресу вашого Netlify (без крапок у назві)
    localStorage.setItem("netlifySiteURL", "https://bastionbc2024-hub.netlify.app");

    // 2. Цей рядок примусово виправляє site_id, щоб не було помилки 404
    window.netlifyIdentity.on("login", () => {
      document.location.href = "/bastion-bc/admin/";
    });

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/bastion-bc/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
